user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log notice;
pid       /var/run/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;

  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

  access_log  /var/log/nginx/access.log off;

  sendfile        on;
  keepalive_timeout  30;

  include /etc/nginx/conf.d/*.conf;

  upstream okamemo_app {
    server unix:///okamemo_app/tmp/sockets/puma.sock;
  }

  server {
    listen       80;
    server_name okamemo.com;

    root /okamemo_app/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    location / {
      try_files $uri $uri/index.html @okamemo_app;
    }

    location @okamemo_app {
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Host $host;

      proxy_pass http://okamemo_app;
    }
  }
}
