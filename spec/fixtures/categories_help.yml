# 一部機能のヘルプモーダルで表示される各カテゴリーの説明
# ヘルプモーダルのテストで使用する
- name: "おまとめ"
  description: "ご飯のおかず、野菜、果物、肉など買うものを大まかに指定するカテゴリー。買うものがはっきりと決まってない時に使います。"
- name: "主食類"
  description: "米、パンなどの主食類を扱うカテゴリー。"
- name: "麺類"
  description: "乾麺、生麺など麺類を扱うカテゴリー。"
- name: "野菜"
  description: "基本的な野菜を扱うカテゴリー。"
- name: "生野菜"
  description: "サラダに使うことが多い水分が多めな野菜を扱うカテゴリー。"
- name: "キノコ類"
  description: "キノコに該当するものを扱うカテゴリー。"
- name: "果物"
  description: "フルーツ類を扱うカテゴリー。"
- name: "肉"
  description: "精肉、加工肉などの肉類全般を扱うカテゴリー。"
- name: "海産物"
  description: "生魚、魚介などの海産物全般を扱うカテゴリー。"
- name: "卵"
  description: "卵類全般を扱うカテゴリー。"
- name: "乳製品"
  description: "乳製品全般を扱うカテゴリー。"
- name: "大豆製品"
  description: "大豆が原料の製品を扱うカテゴリー。"
- name: "粉製品"
  description: "片栗粉、小麦粉などの粉ものを扱うカテゴリー。"
- name: "調味料"
  description: "調味料全般を扱うカテゴリー。"
- name: "油"
  description: "油脂系の製品を扱うカテゴリー。"
- name: "甘い物"
  description: "スイーツ全般を扱うカテゴリー。"
- name: "飲み物"
  description: "飲料を扱うカテゴリー。"
- name: "お風呂用品"
  description: "お風呂で使うものを扱うカテゴリー。"
- name: "歯磨き用品"
  description: "歯磨き用品を扱うカテゴリー。"
- name: "コスメ"
  description: "化粧品や美容品などを扱うカテゴリー。"
- name: "洗濯用品"
  description: "洗剤や柔軟剤などの洗濯用品を扱うカテゴリー。"
- name: "キッチン用品"
  description: "食器類、キッチン用の洗剤、調理器具などキッチン用品全般を扱うカテゴリー。"
- name: "ペーパー類"
  description: "ティッシュ、トイレットペーパーなど紙類を扱うカテゴリー。"
- name: "ペット用品"
  description: "ペット用品全般を扱うカテゴリー。"
- name: "その他"
  description: "他のカテゴリーに該当しないアイテムを扱うカテゴリー。"
